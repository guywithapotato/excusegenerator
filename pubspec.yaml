name: bahane_uretici_3000
description: lowercase, offline-first funny excuse generator for android.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.3.5
  share_plus: ^10.1.4
  confetti: ^0.8.0
  vibration: ^2.0.1
  sensors_plus: ^6.1.1
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/illustrations/
